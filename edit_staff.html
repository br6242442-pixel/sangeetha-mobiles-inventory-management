{% extends 'base.html' %}

{% block content %}

<style>
.page-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

.card{
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
    max-width:500px;
    margin:auto;
}

.form-group{
    margin-bottom:15px;
}

.form-group label{
    display:block;
    margin-bottom:5px;
}

.form-group input{
    width:100%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:6px;
}

.btn{
    padding:8px 15px;
    border:none;
    border-radius:6px;
    color:white;
    text-decoration:none;
}

.btn-update{
    background:#007bff;
}

.btn-back{
    background:#6c757d;
}
</style>

<!-- HEADER -->
<div class="page-header">
    <h2>✏️ Edit Staff</h2>
    <a href="{% url 'staff_list' %}" class="btn btn-back">← Back</a>
</div>

<!-- FORM -->
<div class="card">
    <form method="POST">
        {% csrf_token %}

        <div class="form-group">
            <label>Name</label>
            <input type="text" name="name" value="{{ staff.name }}" required>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" value="{{ staff.email }}" required>
        </div>

        <div class="form-group">
            <label>Phone</label>
            <input type="text" name="phone" value="{{ staff.phone }}" required>
        </div>

        <div class="form-group">
            <label>Role</label>
            <input type="text" name="role" value="{{ staff.role }}" required>
        </div>

        <button type="submit" class="btn btn-update">Update</button>
    </form>
</div>

{% endblock %}
