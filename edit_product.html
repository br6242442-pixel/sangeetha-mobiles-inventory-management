{% extends 'base.html' %}
{% block content %}

<div data-content>

<style>

.card {
    max-width: 1000px;
    margin: auto;
    background: white;
    padding: 35px;
    border-radius: 12px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 25px 40px;
    align-items: center;
}

.grid div {
    display: flex;
    flex-direction: column;
}

label {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 8px;
}

input,
textarea {
    width: 100%;
    padding: 12px;
    border-radius: 6px;
    border: 1px solid #ccc;
    font-size: 16px;
    box-sizing: border-box;
}

textarea {
    min-height: 90px;
    resize: vertical;
}

.btn {
    padding: 12px 22px;
    border-radius: 6px;
    text-decoration: none;
    color: white;
    border: none;
    cursor: pointer;
    font-size: 16px;
    font-weight: 600;
}

.btn-back {
    background: #6c757d;
}

.btn-save {
    background: #28a745;
}

.btn-save:hover {
    background: #218838;
}

.btn-back:hover {
    background: #545b62;
}

h2 {
    margin-bottom: 25px;
    font-size: 30px;
}

</style>

<h2 style="text-align:center;">✏ Edit Product</h2>



<div class="card">


<form method="POST">
{% csrf_token %}

<div class="grid">

<div>
<label>Product ID</label>
<input type="text" name="product_id" value="{{ product.product_id }}">
</div>

<div>
<label>Mobile Name</label>
<input type="text" name="mobile_name" value="{{ product.mobile_name }}">
</div>

<div>
<label>Brand Model</label>
<input type="text" name="brand_model" value="{{ product.brand_model_name }}">
</div>

<div>
<label>IMEI</label>
<input type="text" name="imei" value="{{ product.imei_number }}">
</div>

<div>
<label>Price</label>
<input type="number" name="price" value="{{ product.price }}">
</div>

<div>
<label>Stock</label>
<input type="number" name="stock" value="{{ product.stock_quantity }}">
</div>

<div style="grid-column: span 2;">
<label>Description</label>
<textarea name="description">{{ product.product_description }}</textarea>
</div>

</div>

<div style="margin-top:20px; display:flex; justify-content:space-between;">

<a href="{% url 'product_list' %}" class="btn btn-back">← Back</a>

<button type="submit" class="btn btn-save">Update Product</button>

</div>

</form>

</div>

</div>

<script>
function getCSRFToken() {
    return document.querySelector('[name=csrfmiddlewaretoken]').value;
}

function updateProduct(event){
    event.preventDefault();

    let form = event.target;
    let formData = new FormData(form);

    fetch(window.location.pathname, {
        method: "POST",
        headers: {
            "X-CSRFToken": getCSRFToken()
        },
        body: formData
    })
    .then(res => res.json())
    .then(data => {
        if(data.success){
            loadPage(data.redirect_url);
        }
    })
    .catch(err => {
        console.log("Error:", err);
    });

    return false;
}
</script>

{% endblock %}
