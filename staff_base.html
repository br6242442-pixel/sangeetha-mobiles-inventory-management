<!DOCTYPE html>
<html>
<head>
    <title>Staff Panel</title>
    <style>
        body { margin:0; font-family:Arial; }
        .sidebar {
            width:220px;
            height:100vh;
            background:#2c3e50;
            color:white;
            position:fixed;
        }
        .sidebar a {
            display:block;
            color:white;
            padding:12px;
            text-decoration:none;
        }
        .sidebar a:hover {
            background:#34495e;
        }
        .content {
            margin-left:220px;
            padding:20px;
        }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>Staff Panel</h2>

    <a href="{% url 'staff_dashboard' %}">Dashboard</a>
    <a href="{% url 'product_list' %}">Manage Products</a>
    <a href="{% url 'billing' %}">Billing</a>
    <a href="{% url 'staff_invoice_list' %}">Invoices</a>
    <a href="{% url 'sales_report' %}">Sales Report</a>
    <a href="{% url 'low_stock' %}">Low Stock</a>
    <a href="{% url 'logout' %}">Logout</a>
</div>

<div class="content">
    {% block content %}{% endblock %}
</div>

</body>
</html>
