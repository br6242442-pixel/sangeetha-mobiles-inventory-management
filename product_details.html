<!DOCTYPE html>
<html>
<head>
<title>Product Details</title>

<style>
body{
font-family:Segoe UI;
background:#f4f6f9;
margin:0;
padding:0;
}

.container{
max-width:900px;
margin:50px auto;
background:white;
padding:40px;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

h1{
color:#002b5c;
}

.price{
font-size:22px;
color:#28a745;
margin:10px 0;
}

.back{
display:inline-block;
margin-top:20px;
padding:10px 20px;
background:#002b5c;
color:white;
text-decoration:none;
border-radius:5px;
}

.back:hover{
background:#004080;
}
</style>

</head>

<body>

<div class="container">

<h1>{{ product.name }}</h1>

<p class="price">₹ {{ product.price }}</p>

<p>{{ product.description }}</p>

<a href="/" class="back">⬅ Back to Home</a>

</div>

</body>
</html>
