{% extends 'base.html' %}

{% block content %}

<style>
.page-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
}

.btn-back {
    padding: 6px 12px;
    background: #7f8c8d;
    color: white;
    text-decoration: none;
    border-radius: 5px;
}

/* FORM CARD */
.form-card {
    max-width: 600px;
    margin: 20px auto;
    background: white;
    padding: 25px;
    border-radius: 10px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

/* FORM GROUP */
.form-group {
    margin-bottom: 15px;
}

.form-group label {
    display: block;
    font-weight: bold;
    margin-bottom: 5px;
    color: black;
}

.form-group input,
.form-group textarea {
    width: 100%;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-size: 14px;
    color: black;
}

/* BUTTON */
.btn-submit {
    width: 100%;
    padding: 10px;
    background: #2980b9;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 15px;
    cursor: pointer;
}

.btn-submit:hover {
    background: #216a94;
}

/* ERROR */
.error {
    color: red;
    font-size: 13px;
}
</style>

<div class="page-header">
    <h2>Edit Supplier</h2>
    <a href="{% url 'supplier_list' %}" class="btn-back">← Back</a>
</div>

<div class="form-card">
    <form method="POST" onsubmit="return validateForm()">
        {% csrf_token %}

        <div class="form-group">
            <label>Supplier Name</label>
            <input type="text" id="name" name="name" value="{{ supplier.name }}">
            <div class="error" id="nameError"></div>
        </div>

        <div class="form-group">
            <label>Mobile Number</label>
            <input type="text" id="mobile" name="mobile" value="{{ supplier.phone }}">
            <div class="error" id="mobileError"></div>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" name="email" value="{{ supplier.email }}">
            <div class="error" id="emailError"></div>
        </div>

        <div class="form-group">
            <label>Address</label>
            <textarea id="address" name="address">{{ supplier.address }}</textarea>
            <div class="error" id="addressError"></div>
        </div>

        <button type="submit" class="btn-submit">Update Supplier</button>
    </form>
</div>

<script>
function validateForm(){
    let valid = true;

    document.querySelectorAll(".error").forEach(e => e.innerText = "");

    let name = document.getElementById("name").value.trim();
    let mobile = document.getElementById("mobile").value.trim();
    let email = document.getElementById("email").value.trim();
    let address = document.getElementById("address").value.trim();

    if(name === ""){
        document.getElementById("nameError").innerText = "Enter supplier name";
        valid = false;
    }

    if(mobile.length < 10){
        document.getElementById("mobileError").innerText = "Enter valid mobile number";
        valid = false;
    }

    if(email === "" || !email.includes("@")){
        document.getElementById("emailError").innerText = "Enter valid email";
        valid = false;
    }

    if(address === ""){
        document.getElementById("addressError").innerText = "Enter address";
        valid = false;
    }

    return valid;
}
</script>

{% endblock %}
