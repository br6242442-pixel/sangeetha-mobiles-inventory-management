<!DOCTYPE html>
<html>
<head>
<title>Verify OTP</title>
</head>

<body>

<h2>Enter OTP</h2>

<form method="POST">
{% csrf_token %}

<input type="text" name="otp" placeholder="Enter OTP" required>

<button type="submit">Verify OTP</button>

</form>

{% if messages %}
  {% for message in messages %}
    <p style="color:red;">{{ message }}</p>
  {% endfor %}
{% endif %}

</body>
</html>
