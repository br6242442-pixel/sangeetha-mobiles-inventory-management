{% extends 'base.html' %}

{% block content %}

<style>
/* HEADER */
.page-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

/* BUTTON */
.btn{
    padding:8px 14px;
    border-radius:6px;
    text-decoration:none;
    font-size:14px;
    color:white;
}

.btn-back{
    background:#6c757d;
}

.btn-info{
    background:#3498db;
}

/* CARD */
.card{
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

/* TABLE */
table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#2c3e50;
    color:white;
    padding:12px;
    text-align:center;
}

td{
    color: #2c3e50;
    padding:10px;
    text-align:center;
    border-bottom:1px solid #eee;
}

tr:hover{
    background:#f5f5f5;
}
</style>

<!-- HEADER -->
<div class="page-header">
    <h2>All Invoices</h2>

    <!-- ✅ BACK BUTTON (FIXED) -->
    <a href="{% if role == 'staff' %}/staff_dashboard/{% else %}/admin_dashboard/{% endif %}" class="btn btn-secondary">
    ← Back
</a>
</div>

<div style="margin-bottom:15px;">

    <input type="text"
           id="invoiceSearch"
           placeholder="Search Invoice..."
           style="
                width:300px;
                padding:10px;
                border:1px solid #ccc;
                border-radius:8px;
           ">

</div>

<!-- CARD -->
<div class="card">

    <table>
        <tr>
            <th>Customer</th>
            <th>Total Amount</th>
            <th>Date</th>
            <th>Action</th>
        </tr>

        {% for sale in sales %}
        <tr>
            <td>{{ sale.customer.name }}</td>
            <td>₹ {{ sale.total_price }}</td>
            <td>{{ sale.date }}</td>

            <td>
                <!-- ✅ WORKING BUTTON -->
                <a href="/invoice/{{ sale.id }}/?invoices" class="btn btn-info">
                    View Invoice
                </a>
            </td>
        </tr>
        {% endfor %}

        <tr style="font-weight:bold; background:#f2f2f2;">
    <td>TOTAL</td>
    <td>₹ {{ grand_total }}</td>
    <td></td>
    <td></td>
</tr>

    </table>

</div>

<script>

document.addEventListener("DOMContentLoaded", function(){

    let searchInput =
    document.getElementById("invoiceSearch");

    let rows =
    document.querySelectorAll("table tbody tr");

    searchInput.addEventListener("keyup", function(){

        let value =
        this.value.toLowerCase();

        rows.forEach(function(row){

            let text =
            row.innerText.toLowerCase();

            if(text.includes(value)){

                row.style.display = "";
            }

            else{

                row.style.display = "none";
            }

        });

    });

});

</script>

{% endblock %}
