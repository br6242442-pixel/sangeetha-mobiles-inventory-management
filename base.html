<!DOCTYPE html>
<html>
<head>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <title>Dashboard</title>

    <style>

/* ===== BODY ===== */
body {
    margin: 0;
    font-family: Arial;
    display: flex;
    background: #f5f6fa;
}

/* ===== SIDEBAR ===== */
.sidebar {
    width: 220px;
    background: #ffffff;
    color: #2c3e50;
    height: 100vh;
    padding: 20px;
    border-right: 1px solid #ddd;
}

.sidebar h2 {
    margin-bottom: 20px;
}

.sidebar a {
    display: block;
    color: gray;
    padding: 10px;
    text-decoration: none;
    margin-bottom: 5px;
    border-radius: 6px;
}

.sidebar a:hover {
    background: #f1f1f1;
    color: #3498db;
}

.sidebar i {
    width: 20px;
}

/* ===== CONTENT ===== */
.content {
    flex: 1;
    padding: 20px;
}

/* ===== DASHBOARD GRID ===== */
.dashboard {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 20px;
    margin-top: 20px;
}

/* ===== CLEAN CARD ===== */
.card {
    background: #ffffff;
    padding: 20px;
    border-radius: 12px;
    text-align: center;
    text-decoration: none;
    color: #2c3e50;
    border: 1px solid #e0e0e0;
    transition: 0.3s;
    font-size: 16px;
    font-weight: 500;
}

/* ICON */
.card i {
    font-size: 26px;
    margin-bottom: 10px;
    color: #3498db;
}

/* HOVER EFFECT */
.card:hover {
    transform: translateY(-5px);
    box-shadow: 0 6px 12px rgba(0,0,0,0.1);
}

/* ===== TABLE ===== */
table {
    width: 100%;
    border-collapse: collapse;
    background: white;
}

th {
    background: #2c3e50;
    color: white;
    padding: 10px;
}

td {
    padding: 10px;
    border-bottom: 1px solid #ddd;
    color: black;
}

/* ===== TOAST ===== */
.toast {
    position: fixed;
    top: 20px;
    right: 20px;
    background: #2c3e50;
    color: white;
    padding: 12px 20px;
    border-radius: 8px;
    font-size: 14px;
    opacity: 0;
    transform: translateY(-20px);
    transition: 0.4s;
    z-index: 9999;
}

.toast.show {
    opacity: 1;
    transform: translateY(0);
}

.toast.success { background: #2ecc71; }
.toast.error { background: #e74c3c; }
.toast.warning { background: #f39c12; }

</style>

<style>

/* your existing CSS */

</style>
</head>

<div id="toast" class="toast"></div>



<script>
function showToast(message, type="success") {
    let toast = document.getElementById("toast");
    toast.innerText = message;
    toast.className = "toast show " + type;

    setTimeout(() => {
        toast.className = "toast";
    }, 3000);
}
</script>
