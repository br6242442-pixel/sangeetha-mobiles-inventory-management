{% extends 'base.html' %}
{% block content %}

<style>

.dashboard-container {
    width: 60%;
    margin: 60px auto;
    text-align: center;
}

.menu-grid {
    display: grid;
    grid-template-columns: repeat(2, 200px);
    justify-content: center;
    gap: 25px;
    margin-top: 30px;
}

.menu-box {
    display: block;
    padding: 15px;
    background: #ffffff;
    border: 1px solid #ddd;
    border-radius: 6px;
    text-decoration: none;
    color: #333;
    font-weight: 600;
    text-align: center;
    transition: 0.3s;
}

.menu-box:hover {
    background: #f0f0f0;
    transform: scale(1.05);
}

.card-container {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 20px;
    margin-top: 20px;
}

.card {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 25px;
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 10px;
    text-decoration: none;
    color: #333;
    transition: 0.3s;
}

.card:hover {
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    transform: translateY(-5px);
}

.icon {
    font-size: 30px;
    margin-bottom: 10px;
}


</style>

<h2>Staff Dashboard</h2>

<div class="card-container">

    <a href="{% url 'product_list' %}" class="card">
        <div class="icon">📱</div>
        <div>Products</div>
    </a>

    <a href="{% url 'billing' %}" class="card">
        <div class="icon">🧾</div>
        <div>Billing</div>
    </a>

    <a href="{% url 'sales_report' %}" class="card">
        <div class="icon">📊</div>
        <div>Sales</div>
    </a>

    <a href="{% url 'invoice_list' %}" class="card">
        <div class="icon">📄</div>
        <div>Invoices</div>
    </a>

    <a href="{% url 'low_stock' %}" class="card">
        <div class="icon">⚠️</div>
        <div>Low Stock</div>
    </a>

</div>

{% endblock %}
