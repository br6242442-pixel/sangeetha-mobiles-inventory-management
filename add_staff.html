{% extends 'base.html' %}

{% block content %}

<style>
/* HEADER */
.page-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

/* CARD */
.card{
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
    max-width:500px;
    margin:auto;
}

/* FORM */
.form-group{
    margin-bottom:15px;
}

.form-group label{
    display:block;
    margin-bottom:5px;
    font-weight:500;
}

.form-group input{
    width:100%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:6px;
}

/* BUTTONS */
.btn{
    padding:8px 15px;
    border:none;
    border-radius:6px;
    color:white;
    text-decoration:none;
    font-size:14px;
    cursor:pointer;
}

.btn-add{
    background:#28a745;
}

.btn-back{
    background:#6c757d;
}

.btn-add:hover{
    background:#218838;
}

.btn-back:hover{
    background:#5a6268;
}
</style>

<!-- HEADER -->
<div class="page-header">
    <h2>👨‍💼 Add Staff</h2>
    <a href="{% url 'staff_list' %}" class="btn btn-back">← Back</a>
</div>

<!-- FORM CARD -->
<div class="card">
    <form method="POST">
        {% csrf_token %}

        <div class="form-group">
            <label>Name</label>
            <input type="text" name="name" placeholder="Enter staff name" required>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" placeholder="Enter email" required>
        </div>

        <div class="form-group">
            <label>Phone</label>
            <input type="text" name="phone" placeholder="Enter phone number" required>
        </div>

        <div class="form-group">
            <label>Role</label>
            <input type="text" name="role" placeholder="Enter role (e.g. Manager)" required>
        </div>

        <button type="submit" class="btn btn-add">💾 Save Staff</button>
    </form>
</div>

{% endblock %}
