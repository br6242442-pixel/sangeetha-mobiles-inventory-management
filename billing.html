{% extends 'base.html' %}

{% block content %}

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

.billing-page{

    width:100%;

    padding:20px 30px;

    box-sizing:border-box;
}

.form-box{

    width:100%;
    max-width:760px;

    background:rgba(255,255,255,0.78);

    backdrop-filter:blur(14px);

    border-radius:26px;

    padding:28px;

    box-shadow:
    0 10px 30px rgba(0,0,0,0.06);

    border:1px solid rgba(255,255,255,0.4);
}

/* ===== HEADER ===== */

.form-header{

    display:flex;

    justify-content:space-between;

    align-items:center;

    margin-bottom:28px;
}

.form-header h2{

    font-size:28px;

    color:#6366f1;

    margin:0;

    font-weight:700;
}

.invoice-badge{

    background:#eef2ff;

    color:#4f46e5;

    padding:10px 16px;

    border-radius:12px;

    font-weight:600;

    font-size:14px;
}

/* ===== GRID ===== */

.form-grid{

    display:grid;

    grid-template-columns:1fr 1fr;

    gap:20px;
}

/* ===== INPUT ===== */

.input-group{

    display:flex;

    flex-direction:column;
}

.input-group label{

    margin-bottom:8px;

    font-size:14px;

    font-weight:600;

    color:#475569;
}

.input-box{

    position:relative;
}

.input-box i{

    position:absolute;

    left:14px;

    top:50%;

    transform:translateY(-50%);

    color:#94a3b8;

    font-size:15px;
}

.input-box input,
.input-box select{

    width:100%;

    padding:13px 13px 13px 44px;

    border:none;

    border-radius:14px;

    background:#f8fafc;

    font-size:14px;

    outline:none;

    box-sizing:border-box;

    transition:0.3s;
}

.input-box input:focus,
.input-box select:focus{

    background:#eef2ff;

    box-shadow:
    0 0 0 3px rgba(99,102,241,0.12);
}

/* ===== STOCK ===== */

.stock-box{

    margin-top:18px;

    background:#ecfeff;

    padding:12px 16px;

    border-radius:12px;

    color:#0f766e;

    font-weight:600;

    font-size:14px;
}

/* ===== ERROR ===== */

#stock_error{

    margin-top:10px;

    font-size:14px;

    font-weight:600;
}

/* ===== TOTAL ===== */

.total-section{

    margin-top:28px;

    background:
    linear-gradient(
        135deg,
        #eef2ff,
        #f5f3ff
    );

    padding:22px;

    border-radius:20px;

    display:flex;

    justify-content:space-between;

    align-items:center;

    flex-wrap:wrap;
}

.total-left h3{

    margin:0;

    color:#64748b;

    font-size:16px;
}

.total-left h1{

    margin-top:8px;

    font-size:34px;

    color:#4f46e5;
}

/* ===== BUTTON ===== */

.form-box button{

    padding:14px 26px;

    border:none;

    border-radius:15px;

    background:
    linear-gradient(
        135deg,
        #6366f1,
        #8b5cf6
    );

    color:white;

    font-size:15px;

    font-weight:600;

    cursor:pointer;

    transition:0.3s;
}

.form-box button:hover{

    transform:translateY(-3px);

    box-shadow:
    0 8px 18px rgba(99,102,241,0.25);
}

/* ===== MOBILE ===== */

@media(max-width:768px){

    .form-grid{
        grid-template-columns:1fr;
    }

    .form-box{
        padding:22px;
    }

    .form-header{
        flex-direction:column;
        gap:15px;
        align-items:flex-start;
    }

    .total-section{
        flex-direction:column;
        align-items:flex-start;
        gap:20px;
    }

}

</style>

<div class="billing-page">

<div class="form-box">

    <!-- ===== HEADER ===== -->

    <div class="form-header">

        <h2>Create New Sale</h2>

        <div class="invoice-badge">
            <i class="fa-solid fa-file-invoice"></i>
            Smart Billing
        </div>

    </div>

<form method="POST" action="{% url 'billing' %}">

    {% csrf_token %}

    <div class="form-grid">

        <!-- CUSTOMER -->

        <div class="input-group">

            <label>Customer Name</label>

            <div class="input-box">

                <i class="fa-solid fa-user"></i>

                <input type="text"
                       name="customer"
                       placeholder="Enter Customer Name"
                       required>

            </div>

        </div>

        <!-- PHONE -->

        <div class="input-group">

            <label>Phone Number</label>

            <div class="input-box">

                <i class="fa-solid fa-phone"></i>

                <input type="text"
                       name="phone"
                       placeholder="Enter Phone Number"
                       required>

            </div>

        </div>

        <!-- PRODUCT -->

        <div class="input-group">

            <label>Select Mobile</label>

            <div class="input-box">

                <i class="fa-solid fa-mobile-screen"></i>

                <select name="product_id"
                        id="product"
                        onchange="updatePrice()">

                    <option value="">
                        Select Product
                    </option>

                    {% for product in products %}

                    <option value="{{ product.product_id }}"
                            data-price="{{ product.price }}"
                            data-stock="{{ product.stock_quantity }}">

                        {{ product.mobile_name }}
                        (Stock: {{ product.stock_quantity }})

                    </option>

                    {% endfor %}

                </select>

            </div>

        </div>

        <!-- QUANTITY -->

        <div class="input-group">

            <label>Quantity</label>

            <div class="input-box">

                <i class="fa-solid fa-layer-group"></i>

                <input type="number"
                       name="quantity"
                       id="quantity"
                       oninput="calculateTotal()"
                       placeholder="Enter Quantity"
                       required>

            </div>

        </div>

        <!-- PRICE -->

        <div class="input-group">

            <label>Price</label>

            <div class="input-box">

                <i class="fa-solid fa-indian-rupee-sign"></i>

                <input type="text"
                       id="price"
                       placeholder="Price"
                       readonly>

            </div>

        </div>

        <!-- TOTAL -->

        <div class="input-group">

            <label>Total Price</label>

            <div class="input-box">

                <i class="fa-solid fa-wallet"></i>

                <input type="text"
                       id="total"
                       placeholder="Total Amount"
                       readonly>

            </div>

        </div>

    </div>

    <!-- STOCK -->

    <div class="stock-box">

        Available Stock :
        <span id="available_stock"></span>

    </div>

    <p id="stock_error"></p>

    <!-- TOTAL -->

    <div class="total-section">

        <div class="total-left">

            <h3>Billing Summary</h3>

            <h1>
                ₹ <span id="summary_total">0</span>
            </h1>

        </div>

        <button type="submit" id="sale_btn">

            <i class="fa-solid fa-cart-shopping"></i>

            Create Sale

        </button>

    </div>

</form>

</div>

</div>

<script>

function updatePrice() {

    let product = document.getElementById("product");

    let selected =
        product.options[product.selectedIndex];

    let price =
        selected.getAttribute("data-price");

    let stock =
        selected.getAttribute("data-stock");

    document.getElementById("price").value = price;

    document.getElementById("available_stock").innerText =
        stock;

    calculateTotal();
}

function calculateTotal() {

    let price =
        parseFloat(document.getElementById("price").value) || 0;

    let quantity =
        parseInt(document.getElementById("quantity").value) || 0;

    let product =
        document.getElementById("product");

    let selected =
        product.options[product.selectedIndex];

    let stock =
        parseInt(selected.getAttribute("data-stock")) || 0;

    let total = price * quantity;

    document.getElementById("total").value = total;

    document.getElementById("summary_total").innerText = total;

    let error =
        document.getElementById("stock_error");

    let button =
        document.getElementById("sale_btn");

    if(quantity > stock){

        error.innerText =
            "Only " + stock + " items available";

        error.style.color = "red";

        button.disabled = true;

        button.style.background = "gray";

    }

    else{

        error.innerText = "";

        button.disabled = false;

        button.style.background =
        "linear-gradient(135deg,#6366f1,#8b5cf6)";
    }
}

</script>

{% endblock %}
